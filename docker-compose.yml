services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./services/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  api:
    build: ./services/api
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./services/api/app:/app/app
    env_file: .env
    depends_on:
      - mqtt
    restart: unless-stopped

  telemetry:
    build: ./services/telemetry
    container_name: telemetry
    ports:
      - "8003:8003"
    volumes:
      - rescue-data:/data
      - ./services/telemetry/app:/app/app
    env_file: .env
    depends_on:
      - mqtt
    restart: unless-stopped

  llm:
    build: ./services/llm
    container_name: llm
    ports:
      - "8001:8001"
    volumes:
      - ./services/llm/app:/app/app
    env_file: .env
    restart: unless-stopped

  frontend:
    build: ./services/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

volumes:
  rescue-data:
